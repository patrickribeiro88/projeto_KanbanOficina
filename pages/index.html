<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OficinaTech - Quadro Kanban</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm py-3">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 fw-bold">
                <i class="bi bi-tools text-primary me-2"></i> OficinaTech
            </span>

            <div class="d-flex align-items-center flex-wrap gap-2">
                <div class="input-group input-group-sm d-none d-md-flex" style="width: 280px;">
                    <span class="input-group-text bg-light border-0">
                        <i class="bi bi-search"></i>
                    </span>
                    <input
                        type="text"
                        id="inputBusca"
                        class="form-control border-0 bg-light"
                        placeholder="Buscar cliente, placa, modelo ou OS..."
                    >
                </div>

                <a href="/pages/cliente.html" class="btn btn-outline-light btn-sm fw-bold shadow-sm">
                    <i class="bi bi-calendar-plus me-1"></i> Agendamento Cliente
                </a>

                <button class="btn btn-primary btn-sm fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#modalNovoPedido">
                    <i class="bi bi-plus-lg me-1"></i> Novo Serviço
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row flex-nowrap overflow-auto pb-4 kanban-container">

            <div class="col-md-3 col-10">
                <div class="kanban-column shadow-sm rounded-3" id="col-novos" ondrop="soltar(event)" ondragover="permitirSoltar(event)">
                    <h6 class="column-title d-flex justify-content-between align-items-center mb-3">
                        <span class="text-secondary fw-bold"><i class="bi bi-inbox-fill me-2"></i>Triagem</span>
                        <span class="badge bg-secondary rounded-pill" id="contador-novos">0</span>
                    </h6>
                </div>
            </div>

            <div class="col-md-3 col-10">
                <div class="kanban-column shadow-sm rounded-3" id="col-orcamento" ondrop="soltar(event)" ondragover="permitirSoltar(event)">
                    <h6 class="column-title d-flex justify-content-between align-items-center mb-3">
                        <span class="text-warning fw-bold" style="filter: brightness(0.8);">
                            <i class="bi bi-hourglass-split me-2"></i>Orçamento
                        </span>
                        <span class="badge bg-warning text-dark rounded-pill" id="contador-orcamento">0</span>
                    </h6>
                </div>
            </div>

            <div class="col-md-3 col-10">
                <div class="kanban-column shadow-sm rounded-3 bg-primary-subtle" id="col-andamento" ondrop="soltar(event)" ondragover="permitirSoltar(event)">
                    <h6 class="column-title d-flex justify-content-between align-items-center mb-3">
                        <span class="text-primary fw-bold">
                            <i class="bi bi-wrench-adjustable-circle-fill me-2"></i>Em Oficina
                        </span>
                        <span class="badge bg-primary rounded-pill" id="contador-andamento">0</span>
                    </h6>
                </div>
            </div>

            <div class="col-md-3 col-10">
                <div class="kanban-column shadow-sm rounded-3" id="col-concluido" ondrop="soltar(event)" ondragover="permitirSoltar(event)">
                    <h6 class="column-title d-flex justify-content-between align-items-center mb-3">
                        <span class="text-success fw-bold">
                            <i class="bi bi-check-circle-fill me-2"></i>Retirada
                        </span>
                        <span class="badge bg-success rounded-pill" id="contador-concluido">0</span>
                    </h6>

                    <div class="empty-state text-center p-4 border border-2 border-dashed rounded-3 text-muted" style="border-style: dashed !important; border-color: #dee2e6 !important;">
                        <i class="bi bi-box-arrow-in-down fs-2 opacity-50"></i>
                        <p class="small mt-2 mb-0">Arraste os serviços finalizados para cá</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalNovoPedido" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title fw-bold" id="modalLabel">
                        <i class="bi bi-plus-circle me-2"></i>Nova Ordem de Serviço
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4 bg-light">
                    <form id="formNovoPedidoModal">
                        <div class="row g-3">
                            <h6 class="text-primary fw-bold mb-0 mt-2">
                                <i class="bi bi-person-lines-fill me-2"></i>Dados do Cliente
                            </h6>

                            <div class="col-md-6 mt-2">
                                <label class="form-label small fw-bold text-muted">Nome do Cliente</label>
                                <input type="text" class="form-control" id="modalNome" placeholder="Ex: Maria Oliveira" required>
                            </div>

                            <div class="col-md-6 mt-2">
                                <label class="form-label small fw-bold text-muted">WhatsApp</label>
                                <input type="text" class="form-control" id="modalWhats" placeholder="(00) 00000-0000" required>
                            </div>

                            <h6 class="text-primary fw-bold mb-0 mt-4">
                                <i class="bi bi-car-front-fill me-2"></i>Veículo
                            </h6>

                            <div class="col-md-4 mt-2">
                                <label class="form-label small fw-bold text-muted">Modelo</label>
                                <input type="text" class="form-control" id="modalModelo" placeholder="Ex: VW Gol" required>
                            </div>

                            <div class="col-md-4 mt-2">
                                <label class="form-label small fw-bold text-muted">Ano</label>
                                <input type="number" class="form-control" id="modalAno" placeholder="2020" required>
                            </div>

                            <div class="col-md-4 mt-2">
                                <label class="form-label small fw-bold text-muted">Placa</label>
                                <input type="text" class="form-control text-uppercase" id="modalPlaca" placeholder="ABC-1234" required>
                            </div>

                            <h6 class="text-primary fw-bold mb-0 mt-4">
                                <i class="bi bi-tools me-2"></i>Serviço Solicitado
                            </h6>

                            <div class="col-md-12 mt-2">
                                <label class="form-label small fw-bold text-muted">Tipo de Serviço</label>
                                <select class="form-select" id="modalTipoServico" onchange="toggleDescricaoOutro()" required>
                                    <option value="" disabled selected>Selecione um serviço...</option>
                                    <option value="Troca de Óleo e Filtros">Troca de Óleo e Filtros</option>
                                    <option value="Revisão Geral">Revisão Geral</option>
                                    <option value="Alinhamento e Balanceamento">Alinhamento e Balanceamento</option>
                                    <option value="Suspensão e Freios">Suspensão e Freios</option>
                                    <option value="Bateria e Elétrica">Bateria e Elétrica</option>
                                    <option value="Outro">Outro (Descrever problema)</option>
                                </select>
                            </div>

                            <div class="col-12 mt-2 mb-3 d-none" id="divProblemaOutro">
                                <label class="form-label small fw-bold text-muted">
                                    Descreva o Problema <span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" id="modalProblema" rows="2" placeholder="Ex: Carro fazendo barulho estranho ao frear..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer border-0 bg-white">
                    <button type="button" class="btn btn-light fw-bold px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary fw-bold px-4 shadow-sm" onclick="salvarPedidoManual()">
                        <i class="bi bi-check-lg me-2"></i>Gerar OS
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/script.js"></script>
</body>
</html>
